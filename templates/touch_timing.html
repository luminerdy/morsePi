<!doctype html>
<html>
<head>
    <title>Touch Timing - Pappy's Internet Telegraph</title>
    <link rel="stylesheet" href="/static/style.css?v=20260621-1">
    <link rel="stylesheet" href="/static/touch.css?v=20260621-1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="touch-ui">
    <div class="touch-screen">
        <header class="touch-titlebar">
            <div>
                <p class="eyebrow">Timing</p>
                <h1><a class="touch-student-link" href="/touch/students?next=/touch/daily">{{ current_student.name }}</a></h1>
            </div>
            <a class="touch-top-link" href="/touch/menu">Menu</a>
        </header>

        <main class="touch-settings-layout">
            <form class="panel touch-panel touch-settings-form" method="post" action="/timing-settings">
                <input type="hidden" name="next" value="/touch/timing">

                <label for="character_wpm">Character speed <span>{{ timing.character_wpm }} WPM</span></label>
                <input type="range" id="character_wpm" name="character_wpm" min="5" max="35" value="{{ timing.character_wpm }}">

                <label for="effective_wpm">Learning spacing <span>{{ timing.effective_wpm }} WPM</span></label>
                <input type="range" id="effective_wpm" name="effective_wpm" min="3" max="{{ timing.character_wpm }}" value="{{ timing.effective_wpm }}">

                <label for="tone_hz">Tone <span>{{ timing.tone_hz }} Hz</span></label>
                <input type="range" id="tone_hz" name="tone_hz" min="400" max="1000" step="25" value="{{ timing.tone_hz }}">

                <button type="submit" class="button primary full-width">Save Timing</button>
            </form>

            <section class="touch-timing-note">
                <strong>Beginner</strong>
                <span>{{ timing.character_wpm }} / {{ timing.effective_wpm }} WPM</span>
                <span>{{ timing.tone_hz }} Hz</span>
            </section>
        </main>
    </div>
<script src="/static/app.js?v=20260623-1"></script>
</body>
</html>
