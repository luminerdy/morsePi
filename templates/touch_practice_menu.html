<!doctype html>
<html>
<head>
    <title>Touch Practice - Pappy's Internet Telegraph</title>
    <link rel="stylesheet" href="/static/style.css?v=20260611-2">
    <link rel="stylesheet" href="/static/touch.css?v=20260616-2">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="touch-ui">
    <div class="touch-screen">
        <header class="touch-titlebar">
            <div>
                <p class="eyebrow">Touch</p>
                <h1>Practice</h1>
            </div>
            <a class="touch-top-link" href="/touch">Menu</a>
        </header>

        <main class="touch-menu-grid practice-modes">
            {% for mode_key, mode_config in modes.items() %}
                <a class="touch-menu-card {% if mode == mode_key %}primary{% endif %}" href="/touch/practice/run?mode={{ mode_key }}">
                    <strong>{{ mode_config.label }}</strong>
                    <span>{{ mode_config.progress_label }}</span>
                </a>
            {% endfor %}
        </main>

        <footer class="touch-footer">
            <span>Level {{ overall.level }} · {{ overall.rank }}</span>
            <span>{{ overall.mastery }}% overall</span>
        </footer>
    </div>
</body>
</html>
