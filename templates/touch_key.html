<!doctype html>
<html>
<head>
    <title>Touch Key - Pappy's Internet Telegraph</title>
    <link rel="stylesheet" href="/static/style.css?v=20260620-3">
    <link rel="stylesheet" href="/static/touch.css?v=20260620-3">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="touch-ui"
      data-tone-hz="{{ timing.tone_hz }}"
      data-dot-ms="{{ timing.dot_ms }}"
      data-dash-ms="{{ timing.dash_ms }}"
      data-symbol-gap-ms="{{ timing.symbol_gap_ms }}"
      data-letter-gap-ms="{{ timing.letter_gap_ms }}"
      data-word-gap-ms="{{ timing.word_gap_ms }}"
      data-input-dash-threshold-ms="{{ timing.input_dash_threshold_ms }}">
    <div class="touch-screen">
        <header class="touch-titlebar">
            <div>
                <p class="eyebrow">Key Input</p>
                <h1>{{ current_student.name }}</h1>
            </div>
            <a class="touch-top-link" href="/touch">Menu</a>
        </header>

        <main class="touch-key-layout">
            <section class="panel touch-panel touch-key-panel">
                <div class="section-heading">
                    <h2>Telegraph Key</h2>
                    <span class="status-pill" id="keyerStatus">Live</span>
                </div>
                <div class="field-label">Tapped Morse</div>
                <div class="live-morse touch-live-morse" id="liveMorse">Waiting for key...</div>
                <div class="field-label">Decoded</div>
                <div class="live-decoded touch-live-decoded" id="liveDecoded">---</div>
            </section>

            <section class="touch-side-actions">
                <button type="button" class="button secondary" onclick="clearKeyInput()">Clear</button>
                <a class="button secondary" href="/touch/practice">Practice</a>
            </section>
        </main>
    </div>

<script src="/static/app.js?v=20260618-4"></script>
</body>
</html>
