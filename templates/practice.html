<!doctype html>
<html>
<head>
    <title>Practice Mode - Pappy's Internet Telegraph</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Morse Station</p>
                <h1>Practice Mode</h1>
            </div>

            <nav class="nav-row" aria-label="Primary navigation">
                <a href="/">Home</a>
                <a class="active" href="/practice">Practice</a>
            </nav>
        </header>

        <main class="dashboard-grid">
            <section class="panel practice-panel">
                <div class="section-heading">
                    <h2>Current Prompt</h2>
                    <span class="panel-meta">Beginner letters</span>
                </div>

                <div class="practice-readout">
                    <div>
                        <div class="field-label">Letter</div>
                        <div class="target-letter">{{ target }}</div>
                    </div>

                    <div>
                        <div class="field-label">Morse</div>
                        <div class="expected-morse">{{ expected_morse }}</div>
                    </div>
                </div>

                <div class="action-row">
                    <form method="post" action="/practice/play" class="inline-form">
                        <button type="submit" class="button secondary">Play Letter</button>
                    </form>

                    <form method="post" action="/practice/check" class="inline-form">
                        <button type="submit" class="button primary">Check Answer</button>
                    </form>

                    <form method="post" action="/practice/new" class="inline-form">
                        <button type="submit" class="button secondary">Try Another</button>
                    </form>

                    <button type="button" class="button secondary" onclick="clearKeyInput()">Clear</button>
                </div>
            </section>

            <section class="panel key-panel">
                <div class="section-heading">
                    <h2>Your Key Input</h2>
                    <span class="status-pill">Live</span>
                </div>

                <div class="readout-grid">
                    <div>
                        <div class="field-label">Tapped Morse</div>
                        <div class="live-morse" id="liveMorse">Waiting for key...</div>
                    </div>

                    <div>
                        <div class="field-label">Decoded</div>
                        <div class="live-decoded" id="liveDecoded">---</div>
                    </div>
                </div>
            </section>

            <aside class="side-stack">
                {% if feedback %}
                <section class="panel feedback-box">
                    {{ feedback }}
                </section>
                {% endif %}

                <section class="panel compact-panel">
                    <div class="section-heading">
                        <h2>Beginner Letters</h2>
                    </div>

                    <div class="letter-list">
                        <span>E <strong>.</strong></span>
                        <span>T <strong>-</strong></span>
                        <span>A <strong>.-</strong></span>
                        <span>N <strong>-.</strong></span>
                        <span>I <strong>..</strong></span>
                        <span>M <strong>--</strong></span>
                    </div>
                </section>
            </aside>
        </main>
    </div>

<script src="/static/app.js"></script>
</body>
</html>
